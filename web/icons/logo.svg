<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A5732"/>
      <stop offset="50%" stop-color="#1B7A4A"/>
      <stop offset="100%" stop-color="#2E9D64"/>
    </linearGradient>
    <linearGradient id="balance" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F2EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo circular -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decoração: círculos sutis -->
  <circle cx="430" cy="80" r="80" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="80" cy="430" r="60" fill="#FFFFFF" opacity="0.06"/>

  <!-- Balança da Justiça -->
  <g filter="url(#shadow)" transform="translate(106, 96)">
    <!-- Haste vertical -->
    <rect x="143" y="50" width="14" height="220" rx="3" fill="url(#balance)"/>

    <!-- Base -->
    <rect x="100" y="265" width="100" height="14" rx="4" fill="url(#balance)"/>
    <rect x="115" y="278" width="70" height="20" rx="6" fill="url(#balance)"/>

    <!-- Topo (decoração) -->
    <circle cx="150" cy="50" r="14" fill="url(#balance)"/>

    <!-- Braço horizontal -->
    <rect x="20" y="60" width="260" height="10" rx="3" fill="url(#balance)"/>

    <!-- Correntes -->
    <line x1="55" y1="70" x2="55" y2="100" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
    <line x1="245" y1="70" x2="245" y2="100" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

    <!-- Prato esquerdo -->
    <path d="M 10 100 Q 55 130 100 100 L 90 115 Q 55 130 20 115 Z" fill="url(#balance)"/>
    <ellipse cx="55" cy="103" rx="45" ry="8" fill="#1B7A4A" opacity="0.2"/>

    <!-- Prato direito -->
    <path d="M 200 100 Q 245 130 290 100 L 280 115 Q 245 130 210 115 Z" fill="url(#balance)"/>
    <ellipse cx="245" cy="103" rx="45" ry="8" fill="#1B7A4A" opacity="0.2"/>
  </g>

  <!-- Pin de localização sutil no canto -->
  <g transform="translate(370, 370)" opacity="0.85">
    <circle cx="0" cy="0" r="36" fill="#FFFFFF" opacity="0.15"/>
    <path d="M 0 -22 C -12 -22 -22 -12 -22 0 C -22 14 0 22 0 22 C 0 22 22 14 22 0 C 22 -12 12 -22 0 -22 Z M 0 -8 C 4.4 -8 8 -4.4 8 0 C 8 4.4 4.4 8 0 8 C -4.4 8 -8 4.4 -8 0 C -8 -4.4 -4.4 -8 0 -8 Z" fill="#FFFFFF"/>
  </g>
</svg>
